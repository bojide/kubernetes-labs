# ============================================================
# Deliberately Failing Pod — CrashLoopBackOff Practice
# ============================================================
# This pod is intentionally broken. It runs a command that
# exits immediately with a non-zero exit code.
#
# Because restartPolicy is Always, the kubelet restarts it.
# After repeated failures Kubernetes enters "CrashLoopBackOff"
# — an exponential backoff state that starts at 10s and doubles
# up to a maximum of 5 minutes between restart attempts.
#
# Backoff schedule:
#   Restart 1:  10s wait
#   Restart 2:  20s wait
#   Restart 3:  40s wait
#   Restart 4:  80s wait
#   Restart 5: 160s wait
#   Restart 6+: 300s (5 min) wait
#
# CrashLoopBackOff is one of the most common states you will
# see when debugging real applications. This lab teaches you
# the debugging workflow before you encounter it in production.
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  name: crashing-pod
  namespace: default
  labels:
    app: crashing-pod
    lab: "14-pod-lifecycle"
  annotations:
    description: "Intentionally broken pod for CrashLoopBackOff debugging practice"
    # Hint stored as an annotation — students can find it with kubectl describe
    debug-hint: "Check the command field in the container spec"

spec:
  containers:
    - name: broken-container
      image: busybox:1.36

      # --------------------------------------------------------
      # The deliberately broken command
      # --------------------------------------------------------
      # This command prints a message, then exits with code 1.
      # Exit code 1 is a generic "something went wrong" error.
      #
      # The container will:
      #   1. Start (Kubernetes moves to ContainerCreating → Running)
      #   2. Print the message
      #   3. Exit with code 1 immediately
      #   4. Kubernetes sees a non-zero exit → schedules a restart
      #   5. After enough restarts → CrashLoopBackOff
      # --------------------------------------------------------
      command:
        - /bin/sh
        - -c
        - |
          echo "Starting application..."
          echo "ERROR: Required configuration file /etc/app/config.yaml not found"
          echo "Exiting with error code 1"
          exit 1

      # Even in a crashing container, resources should be set.
      # Without limits, a tight loop could exhaust node CPU.
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"

      # Environment variables are visible in kubectl describe even after the
      # container crashes, which is useful for verifying configuration.
      env:
        - name: APP_VERSION
          value: "1.0.0"
        - name: CONFIG_PATH
          value: "/etc/app/config.yaml"

  # Always restart on failure — this is what causes CrashLoopBackOff
  # (as opposed to OnFailure which also restarts, or Never which does not)
  restartPolicy: Always
